<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SIGNALTRADING — NY Macro Validator</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'Inter',sans-serif; background:#121212; color:#E0E0E0; overflow-x:hidden; }
  ::-webkit-scrollbar { width:6px; }
  ::-webkit-scrollbar-track { background:#121212; }
  ::-webkit-scrollbar-thumb { background:#333; border-radius:3px; }
  ::-webkit-scrollbar-thumb:hover { background:#555; }

  @keyframes pulse-cyan { 0%,100%{box-shadow:0 0 0 0 rgba(0,229,255,0.4)} 50%{box-shadow:0 0 0 8px rgba(0,229,255,0)} }
  @keyframes pulse-green { 0%,100%{box-shadow:0 0 0 0 rgba(0,230,118,0.5)} 50%{box-shadow:0 0 0 8px rgba(0,230,118,0)} }
  @keyframes scan-line { 0%{top:0} 100%{top:100%} }
  @keyframes fade-in { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
  @keyframes shimmer { 0%{background-position:-200% 0} 100%{background-position:200% 0} }

  .pulse-cyan { animation: pulse-cyan 2s infinite; }
  .pulse-green { animation: pulse-green 1.5s infinite; }
  .fade-in { animation: fade-in 0.5s ease-out forwards; }
  .shimmer { background: linear-gradient(90deg,#1A1D1E 25%,#252829 50%,#1A1D1E 75%); background-size:200% 100%; animation:shimmer 1.5s infinite; }

  .scan-overlay { position:absolute; left:0; width:100%; height:3px; background:linear-gradient(90deg,transparent,#00E5FF,transparent); animation:scan-line 1.5s linear infinite; z-index:10; pointer-events:none; }

  .surface { background:#1A1D1E; border:1px solid rgba(0,229,255,0.1); }
  .surface:hover { border-color:rgba(0,229,255,0.2); }

  .drop-zone { border:2px dashed rgba(0,229,255,0.3); transition:all 0.3s; }
  .drop-zone.drag-over { border-color:#00E5FF; background:rgba(0,229,255,0.05); }

  .timeline-line { position:absolute; left:11px; top:0; bottom:0; width:2px; background:rgba(0,229,255,0.15); }
  .timeline-dot { width:24px; height:24px; border-radius:50%; border:2px solid rgba(0,229,255,0.3); background:#1A1D1E; display:flex; align-items:center; justify-content:center; flex-shrink:0; z-index:1; }
  .timeline-dot.active { border-color:#00E5FF; background:rgba(0,229,255,0.15); }
  .timeline-dot.passed { border-color:#00E676; background:rgba(0,230,118,0.1); }

  .btn-primary { background:linear-gradient(135deg,#00E5FF,#00B8D4); color:#121212; font-weight:600; transition:all 0.2s; }
  .btn-primary:hover { transform:translateY(-1px); box-shadow:0 4px 20px rgba(0,229,255,0.3); }
  .btn-primary:active { transform:translateY(0); }
  .btn-primary:disabled { opacity:0.4; cursor:not-allowed; transform:none; box-shadow:none; }
</style>
<script>
tailwind.config = {
  theme: {
    extend: {
      colors: {
        bg: '#121212',
        surface: '#1A1D1E',
        cyan: '#00E5FF',
        cyanDark: '#00B8D4',
        valid: '#00E676',
        invalid: '#FF1744',
        textPrimary: '#E0E0E0',
        textSecondary: '#9E9E9E',
        textMuted: '#616161',
      },
      fontFamily: {
        inter: ['Inter','sans-serif'],
        grotesk: ['Space Grotesk','sans-serif'],
      }
    }
  }
}
</script>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef, useCallback, useMemo } = React;

/* ---- Utility ---- */
function getNYTime() {
  return new Date(new Date().toLocaleString('en-US', { timeZone: 'America/New_York' }));
}

function formatTime(d) {
  return d.toLocaleTimeString('en-US', { hour12: false, hour:'2-digit', minute:'2-digit', second:'2-digit' });
}

function minutesSinceMidnight(d) {
  return d.getHours() * 60 + d.getMinutes() + d.getSeconds() / 60;
}

function getSessionStatus(mins) {
  if (mins < 510) return 'PRE_MARKET';
  if (mins < 570) return 'NY_PRE_OPEN';
  if (mins < 590) return 'NY_OPEN';
  if (mins < 610) return 'MACRO_ACTIVE';
  if (mins < 974) return 'POST_MACRO';
  return 'SESSION_CLOSED';
}

function getSessionLabel(status) {
  const map = {
    PRE_MARKET: 'Pre-Market',
    NY_PRE_OPEN: 'NY Pre-Open',
    NY_OPEN: 'NY Session Open',
    MACRO_ACTIVE: 'Macro Active',
    POST_MACRO: 'Post-Macro',
    SESSION_CLOSED: 'Session Closed'
  };
  return map[status] || status;
}

function getSessionColor(status) {
  if (status === 'MACRO_ACTIVE') return '#00E676';
  if (status === 'POST_MACRO' || status === 'SESSION_CLOSED') return '#FF1744';
  return '#00E5FF';
}

/* ---- Icon helper ---- */
function LucideIcon({ name, size = 18, color, className = '' }) {
  const ref = useRef(null);
  useEffect(() => {
    if (ref.current && lucide && lucide.icons && lucide.icons[name]) {
      const [tag, attrs, children] = lucide.icons[name];
      ref.current.innerHTML = '';
      const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
      Object.entries({ ...attrs, width: size, height: size, stroke: color || 'currentColor' }).forEach(([k,v]) => svg.setAttribute(k, String(v)));
      children.forEach(([ctag, cattrs]) => {
        const el = document.createElementNS('http://www.w3.org/2000/svg', ctag);
        Object.entries(cattrs).forEach(([k,v]) => el.setAttribute(k, String(v)));
        svg.appendChild(el);
      });
      ref.current.appendChild(svg);
    }
  }, [name, size, color]);
  return <span ref={ref} className={`inline-flex items-center ${className}`}/>;
}

/* ---- Top Bar ---- */
function TopBar({ nyTime, mins }) {
  const macroStart = 590;
  const macroEnd = 610;

  let macroContent;
  if (mins < macroStart) {
    const diff = macroStart - mins;
    const m = Math.floor(diff);
    const s = Math.floor((diff - m) * 60);
    macroContent = (
      <div className="flex items-center gap-2">
        <span className="text-textSecondary text-xs uppercase tracking-wider">Macro In</span>
        <span className="font-grotesk text-cyan font-bold text-lg tabular-nums">{String(m).padStart(2,'0')}:{String(s).padStart(2,'0')}</span>
      </div>
    );
  } else if (mins < macroEnd) {
    macroContent = (
      <div className="flex items-center gap-2">
        <span className="w-2.5 h-2.5 rounded-full bg-valid pulse-green"/>
        <span className="font-grotesk text-valid font-bold text-sm uppercase tracking-wider">Macro Active</span>
      </div>
    );
  } else {
    macroContent = (
      <div className="flex items-center gap-2">
        <span className="w-2 h-2 rounded-full bg-invalid"/>
        <span className="font-grotesk text-invalid font-semibold text-sm uppercase tracking-wider">Macro Closed</span>
      </div>
    );
  }

  return (
    <header className="fixed top-0 left-0 right-0 z-50" style={{borderBottom:'1px solid rgba(0,229,255,0.1)', background:'rgba(26,29,30,0.95)', backdropFilter:'blur(12px)'}}>
      <div className="max-w-[1440px] mx-auto px-4 sm:px-6 h-14 flex items-center justify-between">
        <div className="flex items-center gap-2.5">
          <span className="font-grotesk font-bold text-lg tracking-tight text-cyan">SIGNALTRADING</span>
          <span className="text-[10px] font-medium bg-cyan/10 text-cyan px-1.5 py-0.5 rounded">v1.0</span>
        </div>
        <div className="hidden sm:flex flex-col items-center">
          <span className="text-textMuted text-[10px] uppercase tracking-widest">New York</span>
          <span className="font-grotesk font-bold text-2xl tabular-nums text-textPrimary tracking-tight">{formatTime(nyTime)}</span>
        </div>
        <div className="flex items-center">{macroContent}</div>
      </div>
    </header>
  );
}

/* ---- Status Bar ---- */
function StatusBar({ sessionStatus }) {
  const color = getSessionColor(sessionStatus);
  return (
    <div className="fixed top-14 left-0 right-0 z-40" style={{background:'rgba(18,18,18,0.9)', borderBottom:'1px solid rgba(0,229,255,0.07)', backdropFilter:'blur(8px)'}}>
      <div className="max-w-[1440px] mx-auto px-4 sm:px-6 h-9 flex items-center justify-between text-xs">
        <div className="flex items-center gap-4">
          <div className="flex items-center gap-1.5">
            <LucideIcon name="clock" size={12} color="#616161"/>
            <span className="text-textMuted">Window</span>
            <span className="text-textSecondary font-medium">09:50 – 10:10 NY</span>
          </div>
          <div className="hidden sm:flex items-center gap-1.5">
            <span className="w-1.5 h-1.5 rounded-full" style={{background: color}}/>
            <span className="font-medium" style={{color}}>{getSessionLabel(sessionStatus)}</span>
          </div>
        </div>
        <div className="flex items-center gap-1.5">
          <LucideIcon name="calendar" size={12} color="#616161"/>
          <span className="text-textMuted">Econ:</span>
          <span className="bg-valid/10 text-valid px-2 py-0.5 rounded text-[10px] font-semibold uppercase">Clear</span>
        </div>
      </div>
    </div>
  );
}

/* ---- Chart Upload / Validator ---- */
function Validator() {
  const [file, setFile] = useState(null);
  const [preview, setPreview] = useState(null);
  const [analyzing, setAnalyzing] = useState(false);
  const [verdict, setVerdict] = useState(null);
  const [dragOver, setDragOver] = useState(false);
  const inputRef = useRef(null);

  const handleFile = useCallback((f) => {
    if (!f) return;
    if (!['image/png','image/jpeg','image/jpg'].includes(f.type)) return;
    setFile(f);
    setVerdict(null);
    const reader = new FileReader();
    reader.onload = (e) => setPreview(e.target.result);
    reader.readAsDataURL(f);
  }, []);

  const onDrop = useCallback((e) => {
    e.preventDefault(); setDragOver(false);
    const f = e.dataTransfer.files[0];
    handleFile(f);
  }, [handleFile]);

  const analyze = useCallback(() => {
    setAnalyzing(true);
    setVerdict(null);
    const delay = 2000 + Math.random() * 1500;
    setTimeout(() => {
      const isValid = Math.random() > 0.35;
      const nyNow = getNYTime();
      const h = nyNow.getHours();
      const m = nyNow.getMinutes();
      const timeStr = String(h).padStart(2,'0') + ':' + String(m).padStart(2,'0') + ' NY';

      if (isValid) {
        setVerdict({
          valid: true,
          label: 'VALID SETUP',
          checks: [
            { pass: true, label: 'Time Window', detail: timeStr + ' \u2014 Within Macro Range' },
            { pass: true, label: 'Price vs Midnight Open (00:00)', detail: 'Price below \u2014 Long Bias confirmed' },
            { pass: true, label: 'Price vs 08:30 Open', detail: 'Price below \u2014 Aligned' },
            { pass: true, label: 'Price vs Previous Close (16:14)', detail: 'Price below \u2014 Aligned' },
            { pass: true, label: 'FVG Present', detail: 'Bullish FVG detected after 09:30' },
            { pass: true, label: 'Tier Model', detail: 'Tier 1 \u2014 Judas Swing identified' },
          ],
          risk: 'Draw on liquidity targets Previous Day Close at 1.0847'
        });
      } else {
        const templates = [
          {
            label: 'INVALID \u2014 NO FVG DETECTED',
            checks: [
              { pass: true, label: 'Time Window', detail: timeStr + ' \u2014 Within Macro Range' },
              { pass: true, label: 'Price vs Midnight Open (00:00)', detail: 'Price below \u2014 Long Bias confirmed' },
              { pass: true, label: 'Price vs 08:30 Open', detail: 'Price below \u2014 Aligned' },
              { pass: false, label: 'Price vs Previous Close (16:14)', detail: 'Price above \u2014 Misaligned with bias' },
              { pass: false, label: 'FVG Present', detail: 'No Fair Value Gap detected in range' },
              { pass: true, label: 'Tier Model', detail: 'Tier 3 \u2014 Consolidation pattern' },
            ],
            risk: 'Insufficient displacement. Wait for next macro window.'
          },
          {
            label: 'INVALID \u2014 TIME WINDOW VIOLATION',
            checks: [
              { pass: false, label: 'Time Window', detail: timeStr + ' \u2014 Outside macro window' },
              { pass: true, label: 'Price vs Midnight Open (00:00)', detail: 'Price above \u2014 Short Bias' },
              { pass: true, label: 'Price vs 08:30 Open', detail: 'Price above \u2014 Aligned' },
              { pass: true, label: 'Price vs Previous Close (16:14)', detail: 'Price above \u2014 Aligned' },
              { pass: true, label: 'FVG Present', detail: 'Bearish FVG at 09:35' },
              { pass: false, label: 'Tier Model', detail: 'No clear tier pattern identified' },
            ],
            risk: 'Trade outside macro window carries elevated risk.'
          },
          {
            label: 'INVALID \u2014 BIAS CONFLICT',
            checks: [
              { pass: true, label: 'Time Window', detail: timeStr + ' \u2014 Within Macro Range' },
              { pass: false, label: 'Price vs Midnight Open (00:00)', detail: 'Price above \u2014 Conflicts with long bias' },
              { pass: false, label: 'Price vs 08:30 Open', detail: 'Price above \u2014 Misaligned' },
              { pass: true, label: 'Price vs Previous Close (16:14)', detail: 'Price below \u2014 Partial alignment' },
              { pass: true, label: 'FVG Present', detail: 'Bullish FVG detected but bias unclear' },
              { pass: false, label: 'Tier Model', detail: 'Conflicting signals across tiers' },
            ],
            risk: 'Multiple reference levels misaligned. No trade recommended.'
          }
        ];
        const pick = templates[Math.floor(Math.random() * templates.length)];
        setVerdict({ valid: false, ...pick });
      }
      setAnalyzing(false);
    }, delay);
  }, []);

  const reset = useCallback(() => {
    setFile(null); setPreview(null); setVerdict(null); setAnalyzing(false);
  }, []);

  return (
    <div className="space-y-4">
      <div className="flex items-center justify-between mb-1">
        <h2 className="font-grotesk font-bold text-base text-textPrimary flex items-center gap-2">
          <LucideIcon name="scan-line" size={18} color="#00E5FF"/>
          Chart Validator
        </h2>
        {file && <button onClick={reset} className="text-textMuted hover:text-textSecondary text-xs flex items-center gap-1 transition"><LucideIcon name="x" size={14}/> Clear</button>}
      </div>

      {/* Upload Zone */}
      <div
        className={'drop-zone rounded-lg relative overflow-hidden transition-all cursor-pointer ' + (dragOver ? 'drag-over ' : '') + (preview ? 'p-0' : 'p-8')}
        style={{minHeight: preview ? 'auto' : '200px', display:'flex', alignItems:'center', justifyContent:'center'}}
        onDragOver={(e) => { e.preventDefault(); setDragOver(true); }}
        onDragLeave={() => setDragOver(false)}
        onDrop={onDrop}
        onClick={() => !file && inputRef.current && inputRef.current.click()}
      >
        <input ref={inputRef} type="file" accept=".png,.jpg,.jpeg" className="hidden" onChange={(e) => handleFile(e.target.files[0])}/>

        {!preview ? (
          <div className="flex flex-col items-center justify-center text-center gap-3">
            <div className="w-14 h-14 rounded-xl bg-cyan/5 flex items-center justify-center border border-cyan/10">
              <LucideIcon name="upload-cloud" size={28} color="#00E5FF"/>
            </div>
            <div>
              <p className="text-textSecondary text-sm font-medium">Drop your chart screenshot here</p>
              <p className="text-textMuted text-xs mt-1">or click to upload &middot; PNG, JPG</p>
            </div>
          </div>
        ) : (
          <div className="relative w-full">
            {analyzing && <div className="scan-overlay"/>}
            <img src={preview} alt="Chart" className="w-full rounded-lg" style={{maxHeight:'360px', objectFit:'contain', background:'#0d0d0d'}}/>
            {analyzing && <div className="absolute inset-0 bg-bg/30 rounded-lg flex items-center justify-center">
              <div className="flex flex-col items-center gap-2">
                <div className="w-8 h-8 border-2 border-cyan border-t-transparent rounded-full animate-spin"/>
                <span className="text-cyan text-xs font-medium uppercase tracking-wider">Analyzing Structure...</span>
              </div>
            </div>}
          </div>
        )}
      </div>

      {/* Analyze Button */}
      {preview && !verdict && (
        <button onClick={analyze} disabled={analyzing} className="btn-primary w-full py-3 rounded-lg text-sm flex items-center justify-center gap-2">
          <LucideIcon name="cpu" size={16} color="#121212"/>
          {analyzing ? 'Scanning Chart...' : 'Analyze Chart'}
        </button>
      )}

      {/* Verdict Panel */}
      {verdict && (
        <div className="fade-in space-y-3">
          <div className={'rounded-lg px-4 py-3 flex items-center gap-3 ' + (verdict.valid ? 'bg-valid/10 border border-valid/20' : 'bg-invalid/10 border border-invalid/20')}>
            <LucideIcon name={verdict.valid ? 'check-circle-2' : 'x-circle'} size={22} color={verdict.valid ? '#00E676' : '#FF1744'}/>
            <span className={'font-grotesk font-bold text-base ' + (verdict.valid ? 'text-valid' : 'text-invalid')}>{verdict.label}</span>
          </div>

          <div className="surface rounded-lg divide-y divide-white/5">
            {verdict.checks.map((c, i) => (
              <div key={i} className="flex items-start gap-3 px-4 py-2.5">
                <span className="mt-0.5 flex-shrink-0">
                  {c.pass
                    ? <LucideIcon name="check" size={14} color="#00E676"/>
                    : <LucideIcon name="x" size={14} color="#FF1744"/>
                  }
                </span>
                <div className="min-w-0">
                  <span className="text-textSecondary text-xs font-medium">{c.label}</span>
                  <p className={'text-xs mt-0.5 ' + (c.pass ? 'text-valid/80' : 'text-invalid/80')}>{c.detail}</p>
                </div>
              </div>
            ))}
          </div>

          <div className="surface rounded-lg px-4 py-3 flex items-start gap-2">
            <LucideIcon name="alert-triangle" size={14} color="#FFA726" className="mt-0.5 flex-shrink-0"/>
            <p className="text-xs text-textSecondary leading-relaxed">{verdict.risk}</p>
          </div>

          <button onClick={analyze} className="btn-primary w-full py-2.5 rounded-lg text-xs flex items-center justify-center gap-2">
            <LucideIcon name="refresh-cw" size={14} color="#121212"/>
            Re-Analyze
          </button>
        </div>
      )}
    </div>
  );
}

/* ---- Mentor's Levels ---- */
function MentorLevels() {
  const levels = [
    { label: 'Previous Close (16:14)', value: '1.0847' },
    { label: 'Midnight Open (00:00)', value: '1.0832' },
    { label: '08:30 Open', value: '1.0819' },
    { label: 'NY Open (09:30)', value: '1.0825' },
  ];
  return (
    <div className="surface rounded-lg p-4">
      <h3 className="font-grotesk font-semibold text-sm text-textPrimary flex items-center gap-2 mb-3">
        <LucideIcon name="target" size={15} color="#00E5FF"/>
        Master Levels — Today
      </h3>
      <div className="space-y-2">
        {levels.map((l, i) => (
          <div key={i} className="flex items-center justify-between py-1.5 px-2 rounded hover:bg-white/[0.02] transition">
            <div className="flex items-center gap-2">
              <span className="w-1.5 h-1.5 rounded-full bg-cyan"/>
              <span className="text-textSecondary text-xs">{l.label}</span>
            </div>
            <span className="font-grotesk font-semibold text-sm text-textPrimary tabular-nums">{l.value}</span>
          </div>
        ))}
      </div>
      <p className="text-textMuted text-[10px] mt-3 pt-2 border-t border-white/5">Updated by Mentor &middot; Today 08:15 NY</p>
    </div>
  );
}

/* ---- Session Timeline ---- */
function SessionTimeline({ mins }) {
  const events = [
    { time: '00:00', label: 'Midnight Open', m: 0 },
    { time: '08:30', label: 'Pre-Market Open', m: 510 },
    { time: '09:30', label: 'NY Session Open', m: 570 },
    { time: '09:50', label: 'Macro Start', m: 590, highlight: true },
    { time: '10:10', label: 'Macro End', m: 610 },
    { time: '16:14', label: 'Session Close', m: 974 },
  ];

  function dotClass(m, i) {
    if (mins >= m && (i === events.length - 1 || mins < events[i + 1].m)) return 'active';
    if (mins > m) return 'passed';
    return '';
  }

  return (
    <div className="surface rounded-lg p-4">
      <h3 className="font-grotesk font-semibold text-sm text-textPrimary flex items-center gap-2 mb-3">
        <LucideIcon name="git-branch" size={15} color="#00E5FF"/>
        Session Timeline
      </h3>
      <div className="relative pl-0">
        <div className="timeline-line"/>
        <div className="space-y-3">
          {events.map((ev, i) => {
            const dc = dotClass(ev.m, i);
            const isActive = dc === 'active';
            return (
              <div key={i} className="flex items-center gap-3 relative">
                <div className={'timeline-dot ' + dc + (isActive ? ' pulse-cyan' : '')}>
                  {dc === 'passed' && <span className="w-2 h-2 rounded-full bg-valid"/>}
                  {isActive && <span className="w-2 h-2 rounded-full bg-cyan"/>}
                </div>
                <div className="flex-1 flex items-center justify-between">
                  <span className={'text-xs ' + (isActive ? 'text-cyan font-semibold' : dc === 'passed' ? 'text-textSecondary' : 'text-textMuted') + (ev.highlight ? ' font-semibold' : '')}>{ev.label}</span>
                  <span className={'text-[11px] font-grotesk tabular-nums ' + (isActive ? 'text-cyan' : 'text-textMuted')}>{ev.time}</span>
                </div>
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
}

/* ---- Tier Model ---- */
function TierModel() {
  const tiers = [
    { tier: 1, name: 'Judas Swing', desc: 'False move \u2192 Sweep \u2192 Reversal', icon: 'zap' },
    { tier: 2, name: 'Continuation', desc: 'No return to first FVG by 09:45', icon: 'trending-up' },
    { tier: 3, name: 'Consolidation', desc: 'No sweep, accumulation from open', icon: 'pause' },
  ];
  return (
    <div className="surface rounded-lg p-4">
      <h3 className="font-grotesk font-semibold text-sm text-textPrimary flex items-center gap-2 mb-3">
        <LucideIcon name="layers" size={15} color="#00E5FF"/>
        Tier Model Reference
      </h3>
      <div className="space-y-2">
        {tiers.map((t) => (
          <div key={t.tier} className="flex items-start gap-3 p-2 rounded hover:bg-white/[0.02] transition">
            <div className="w-7 h-7 rounded bg-cyan/10 flex items-center justify-center flex-shrink-0">
              <LucideIcon name={t.icon} size={14} color="#00E5FF"/>
            </div>
            <div>
              <div className="flex items-center gap-2">
                <span className="text-[10px] font-bold text-cyan bg-cyan/10 px-1.5 py-0.5 rounded">T{t.tier}</span>
                <span className="text-xs font-medium text-textPrimary">{t.name}</span>
              </div>
              <p className="text-textMuted text-[11px] mt-0.5">{t.desc}</p>
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

/* ---- Quick Stats ---- */
function QuickStats() {
  const stats = [
    { label: 'Charts Today', value: '12', icon: 'bar-chart-3' },
    { label: 'Valid Setups', value: '8', icon: 'check-circle-2', color: '#00E676' },
    { label: 'Win Rate', value: '67%', icon: 'percent' },
    { label: 'Streak', value: '3', icon: 'flame', color: '#FFA726' },
  ];
  return (
    <div className="surface rounded-lg p-4">
      <h3 className="font-grotesk font-semibold text-sm text-textPrimary flex items-center gap-2 mb-3">
        <LucideIcon name="activity" size={15} color="#00E5FF"/>
        Quick Stats
      </h3>
      <div className="grid grid-cols-2 gap-2">
        {stats.map((s, i) => (
          <div key={i} className="bg-bg/50 rounded-lg p-3 border border-white/[0.03]">
            <div className="flex items-center gap-1.5 mb-1">
              <LucideIcon name={s.icon} size={12} color={s.color || '#616161'}/>
              <span className="text-textMuted text-[10px] uppercase tracking-wider">{s.label}</span>
            </div>
            <span className="font-grotesk font-bold text-xl text-textPrimary">{s.value}</span>
          </div>
        ))}
      </div>
    </div>
  );
}

/* ---- Footer ---- */
function Footer() {
  return (
    <footer className="mt-6 space-y-3">
      <div className="surface rounded-lg px-4 py-3 flex flex-wrap items-center gap-2 text-xs">
        <LucideIcon name="calendar" size={14} color="#616161"/>
        <span className="text-textMuted">Upcoming:</span>
        <span className="text-textSecondary">NFP &mdash; Apr 4</span>
        <span className="text-textMuted">|</span>
        <span className="text-textSecondary">CPI &mdash; Apr 10</span>
        <span className="text-textMuted">|</span>
        <span className="text-textSecondary">FOMC &mdash; Apr 30</span>
      </div>
      <p className="text-center text-textMuted text-[11px] pb-4">
        SignalTrading v1.0 &mdash; Built for students of the NY Macro Model
      </p>
    </footer>
  );
}

/* ---- App ---- */
function App() {
  const [nyTime, setNyTime] = useState(getNYTime());
  const mins = useMemo(() => minutesSinceMidnight(nyTime), [nyTime]);
  const sessionStatus = useMemo(() => getSessionStatus(mins), [mins]);

  useEffect(() => {
    const id = setInterval(() => setNyTime(getNYTime()), 1000);
    return () => clearInterval(id);
  }, []);

  return (
    <div className="min-h-screen bg-bg">
      <TopBar nyTime={nyTime} mins={mins}/>
      <StatusBar sessionStatus={sessionStatus}/>

      <main className="max-w-[1440px] mx-auto px-4 sm:px-6 pt-[100px] pb-4">
        <div className="flex flex-col lg:flex-row gap-4">
          {/* Left Column */}
          <div className="w-full lg:w-[60%]">
            <div className="surface rounded-lg p-4 sm:p-5">
              <Validator/>
            </div>
          </div>

          {/* Right Column */}
          <div className="w-full lg:w-[40%] space-y-4">
            <MentorLevels/>
            <SessionTimeline mins={mins}/>
            <TierModel/>
            <QuickStats/>
          </div>
        </div>

        <Footer/>
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
