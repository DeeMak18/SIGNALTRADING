<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SIGNALTRADING — NY Macro Validator</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'Inter',sans-serif; background:#121212; color:#E0E0E0; overflow-x:hidden; }
  ::-webkit-scrollbar { width:6px; }
  ::-webkit-scrollbar-track { background:#121212; }
  ::-webkit-scrollbar-thumb { background:#333; border-radius:3px; }
  ::-webkit-scrollbar-thumb:hover { background:#555; }

  @keyframes pulse-cyan { 0%,100%{box-shadow:0 0 0 0 rgba(0,229,255,0.4)} 50%{box-shadow:0 0 0 8px rgba(0,229,255,0)} }
  @keyframes pulse-green { 0%,100%{box-shadow:0 0 0 0 rgba(0,230,118,0.5)} 50%{box-shadow:0 0 0 8px rgba(0,230,118,0)} }
  @keyframes scan-line { 0%{top:0} 100%{top:100%} }
  @keyframes fade-in { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
  @keyframes shimmer { 0%{background-position:-200% 0} 100%{background-position:200% 0} }

  .pulse-cyan { animation: pulse-cyan 2s infinite; }
  .pulse-green { animation: pulse-green 1.5s infinite; }
  .fade-in { animation: fade-in 0.5s ease-out forwards; }
  .shimmer { background: linear-gradient(90deg,#1A1D1E 25%,#252829 50%,#1A1D1E 75%); background-size:200% 100%; animation:shimmer 1.5s infinite; }

  .scan-overlay { position:absolute; left:0; width:100%; height:3px; background:linear-gradient(90deg,transparent,#00E5FF,transparent); animation:scan-line 1.5s linear infinite; z-index:10; pointer-events:none; }

  .surface { background:#1A1D1E; border:1px solid rgba(0,229,255,0.1); }
  .surface:hover { border-color:rgba(0,229,255,0.2); }

  .drop-zone { border:2px dashed rgba(0,229,255,0.3); transition:all 0.3s; }
  .drop-zone.drag-over { border-color:#00E5FF; background:rgba(0,229,255,0.05); }

  .timeline-line { position:absolute; left:11px; top:0; bottom:0; width:2px; background:rgba(0,229,255,0.15); }
  .timeline-dot { width:24px; height:24px; border-radius:50%; border:2px solid rgba(0,229,255,0.3); background:#1A1D1E; display:flex; align-items:center; justify-content:center; flex-shrink:0; z-index:1; }
  .timeline-dot.active { border-color:#00E5FF; background:rgba(0,229,255,0.15); }
  .timeline-dot.passed { border-color:#00E676; background:rgba(0,230,118,0.1); }

  .btn-primary { background:linear-gradient(135deg,#00E5FF,#00B8D4); color:#121212; font-weight:600; transition:all 0.2s; }
  .btn-primary:hover { transform:translateY(-1px); box-shadow:0 4px 20px rgba(0,229,255,0.3); }
  .btn-primary:active { transform:translateY(0); }
  .btn-primary:disabled { opacity:0.4; cursor:not-allowed; transform:none; box-shadow:none; }

  .verdict-glow-green { box-shadow: 0 0 30px rgba(0,230,118,0.15), inset 0 0 30px rgba(0,230,118,0.05); }
  .verdict-glow-red { box-shadow: 0 0 30px rgba(255,23,68,0.15), inset 0 0 30px rgba(255,23,68,0.05); }
  .verdict-glow-cyan { box-shadow: 0 0 30px rgba(0,229,255,0.15), inset 0 0 30px rgba(0,229,255,0.05); }
  .verdict-glow-amber { box-shadow: 0 0 30px rgba(255,167,38,0.15), inset 0 0 30px rgba(255,167,38,0.05); }
</style>
<script>
tailwind.config = {
  theme: {
    extend: {
      colors: {
        bg: '#121212',
        surface: '#1A1D1E',
        cyan: '#00E5FF',
        cyanDark: '#00B8D4',
        valid: '#00E676',
        invalid: '#FF1744',
        amber: '#FFA726',
        textPrimary: '#E0E0E0',
        textSecondary: '#9E9E9E',
        textMuted: '#616161',
      },
      fontFamily: {
        inter: ['Inter','sans-serif'],
        grotesk: ['Space Grotesk','sans-serif'],
      }
    }
  }
}
</script>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef, useCallback, useMemo } = React;

/* ---- Utility ---- */
function getNYTime() {
  return new Date(new Date().toLocaleString('en-US', { timeZone: 'America/New_York' }));
}

function formatTime(d) {
  return d.toLocaleTimeString('en-US', { hour12: false, hour:'2-digit', minute:'2-digit', second:'2-digit' });
}

function minutesSinceMidnight(d) {
  return d.getHours() * 60 + d.getMinutes() + d.getSeconds() / 60;
}

function getSessionStatus(mins) {
  if (mins < 510) return 'PRE_MARKET';
  if (mins < 570) return 'NY_PRE_OPEN';
  if (mins < 590) return 'NY_OPEN';
  if (mins < 610) return 'MACRO_ACTIVE';
  if (mins < 974) return 'POST_MACRO';
  return 'SESSION_CLOSED';
}

function getSessionLabel(status) {
  const map = {
    PRE_MARKET: 'Pre-Market',
    NY_PRE_OPEN: 'NY Pre-Open',
    NY_OPEN: 'NY Session Open',
    MACRO_ACTIVE: 'Macro Active',
    POST_MACRO: 'Post-Macro',
    SESSION_CLOSED: 'Session Closed'
  };
  return map[status] || status;
}

function getSessionColor(status) {
  if (status === 'MACRO_ACTIVE') return '#00E676';
  if (status === 'POST_MACRO' || status === 'SESSION_CLOSED') return '#FF1744';
  return '#00E5FF';
}

/* ---- Icon helper ---- */
function LucideIcon({ name, size = 18, color, className = '' }) {
  const ref = useRef(null);
  useEffect(() => {
    if (ref.current && lucide && lucide.icons && lucide.icons[name]) {
      const [tag, attrs, children] = lucide.icons[name];
      ref.current.innerHTML = '';
      const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
      Object.entries({ ...attrs, width: size, height: size, stroke: color || 'currentColor' }).forEach(([k,v]) => svg.setAttribute(k, String(v)));
      children.forEach(([ctag, cattrs]) => {
        const el = document.createElementNS('http://www.w3.org/2000/svg', ctag);
        Object.entries(cattrs).forEach(([k,v]) => el.setAttribute(k, String(v)));
        svg.appendChild(el);
      });
      ref.current.appendChild(svg);
    }
  }, [name, size, color]);
  return <span ref={ref} className={`inline-flex items-center ${className}`}/>;
}

/* ---- API Key Manager ---- */
function useApiKey() {
  const [apiKey, setApiKey] = useState(() => localStorage.getItem('st_api_key') || '');
  const save = useCallback((key) => {
    setApiKey(key);
    if (key) localStorage.setItem('st_api_key', key);
    else localStorage.removeItem('st_api_key');
  }, []);
  return [apiKey, save];
}

/* ---- Settings Modal ---- */
function SettingsModal({ open, onClose, apiKey, onSave }) {
  const [key, setKey] = useState(apiKey);
  if (!open) return null;
  return (
    <div className="fixed inset-0 z-[100] flex items-center justify-center bg-black/60 backdrop-blur-sm" onClick={onClose}>
      <div className="surface rounded-xl p-6 w-full max-w-md mx-4 space-y-4" onClick={e => e.stopPropagation()}>
        <div className="flex items-center justify-between">
          <h3 className="font-grotesk font-bold text-base text-textPrimary flex items-center gap-2">
            <LucideIcon name="settings" size={18} color="#00E5FF"/>
            Settings
          </h3>
          <button onClick={onClose} className="text-textMuted hover:text-textSecondary"><LucideIcon name="x" size={18}/></button>
        </div>
        <div>
          <label className="block text-xs text-textSecondary mb-1.5">Anthropic API Key</label>
          <input
            type="password"
            value={key}
            onChange={e => setKey(e.target.value)}
            placeholder="sk-ant-..."
            className="w-full bg-bg border border-white/10 rounded-lg px-3 py-2.5 text-sm text-textPrimary placeholder-textMuted focus:border-cyan/50 focus:outline-none transition"
          />
          <p className="text-textMuted text-[10px] mt-1.5">Your key is stored locally in your browser. Never shared.</p>
        </div>
        <div className="flex gap-2">
          <button onClick={() => { onSave(key); onClose(); }} className="btn-primary flex-1 py-2.5 rounded-lg text-sm">Save</button>
          <button onClick={onClose} className="flex-1 py-2.5 rounded-lg text-sm border border-white/10 text-textSecondary hover:bg-white/5 transition">Cancel</button>
        </div>
      </div>
    </div>
  );
}

/* ---- Top Bar ---- */
function TopBar({ nyTime, mins, onSettings }) {
  const macroStart = 590;
  const macroEnd = 610;

  let macroContent;
  if (mins < macroStart) {
    const diff = macroStart - mins;
    const m = Math.floor(diff);
    const s = Math.floor((diff - m) * 60);
    macroContent = (
      <div className="flex items-center gap-2">
        <span className="text-textSecondary text-xs uppercase tracking-wider">Macro In</span>
        <span className="font-grotesk text-cyan font-bold text-lg tabular-nums">{String(m).padStart(2,'0')}:{String(s).padStart(2,'0')}</span>
      </div>
    );
  } else if (mins < macroEnd) {
    macroContent = (
      <div className="flex items-center gap-2">
        <span className="w-2.5 h-2.5 rounded-full bg-valid pulse-green"/>
        <span className="font-grotesk text-valid font-bold text-sm uppercase tracking-wider">Macro Active</span>
      </div>
    );
  } else {
    macroContent = (
      <div className="flex items-center gap-2">
        <span className="w-2 h-2 rounded-full bg-invalid"/>
        <span className="font-grotesk text-invalid font-semibold text-sm uppercase tracking-wider">Macro Closed</span>
      </div>
    );
  }

  return (
    <header className="fixed top-0 left-0 right-0 z-50" style={{borderBottom:'1px solid rgba(0,229,255,0.1)', background:'rgba(26,29,30,0.95)', backdropFilter:'blur(12px)'}}>
      <div className="max-w-[1440px] mx-auto px-4 sm:px-6 h-14 flex items-center justify-between">
        <div className="flex items-center gap-2.5">
          <span className="font-grotesk font-bold text-lg tracking-tight text-cyan">SIGNALTRADING</span>
          <span className="text-[10px] font-medium bg-cyan/10 text-cyan px-1.5 py-0.5 rounded">v2.0</span>
        </div>
        <div className="hidden sm:flex flex-col items-center">
          <span className="text-textMuted text-[10px] uppercase tracking-widest">New York</span>
          <span className="font-grotesk font-bold text-2xl tabular-nums text-textPrimary tracking-tight">{formatTime(nyTime)}</span>
        </div>
        <div className="flex items-center gap-3">
          {macroContent}
          <button onClick={onSettings} className="ml-2 p-1.5 rounded-lg hover:bg-white/5 transition text-textMuted hover:text-cyan">
            <LucideIcon name="settings" size={16}/>
          </button>
        </div>
      </div>
    </header>
  );
}

/* ---- Status Bar ---- */
function StatusBar({ sessionStatus }) {
  const color = getSessionColor(sessionStatus);
  return (
    <div className="fixed top-14 left-0 right-0 z-40" style={{background:'rgba(18,18,18,0.9)', borderBottom:'1px solid rgba(0,229,255,0.07)', backdropFilter:'blur(8px)'}}>
      <div className="max-w-[1440px] mx-auto px-4 sm:px-6 h-9 flex items-center justify-between text-xs">
        <div className="flex items-center gap-4">
          <div className="flex items-center gap-1.5">
            <LucideIcon name="clock" size={12} color="#616161"/>
            <span className="text-textMuted">Window</span>
            <span className="text-textSecondary font-medium">09:50 – 10:10 NY</span>
          </div>
          <div className="hidden sm:flex items-center gap-1.5">
            <span className="w-1.5 h-1.5 rounded-full" style={{background: color}}/>
            <span className="font-medium" style={{color}}>{getSessionLabel(sessionStatus)}</span>
          </div>
        </div>
        <div className="flex items-center gap-1.5">
          <LucideIcon name="cpu" size={12} color="#616161"/>
          <span className="text-textMuted">Engine:</span>
          <span className="text-cyan text-[10px] font-semibold">Claude Vision</span>
        </div>
      </div>
    </div>
  );
}

/* ---- Verdict Display Helpers ---- */
function getVerdictConfig(verdict) {
  const map = {
    'EXECUTE': { label: 'EXECUTE', color: '#00E676', bg: 'bg-valid/10', border: 'border-valid/20', glow: 'verdict-glow-green', icon: 'check-circle-2' },
    'EXECUTE_WITH_CAUTION': { label: 'EXECUTE WITH CAUTION', color: '#FFA726', bg: 'bg-amber/10', border: 'border-amber/20', glow: 'verdict-glow-amber', icon: 'alert-triangle' },
    'BIAS_IDENTIFIED_MONITOR': { label: 'BIAS IDENTIFIED — MONITOR', color: '#00E5FF', bg: 'bg-cyan/10', border: 'border-cyan/20', glow: 'verdict-glow-cyan', icon: 'eye' },
    'MODEL_FAILURE_EXECUTE_NEW_DIRECTION': { label: 'MODEL FAILURE — NEW DIRECTION', color: '#FFA726', bg: 'bg-amber/10', border: 'border-amber/20', glow: 'verdict-glow-amber', icon: 'alert-triangle' },
    'INVALID_NEWS_DAY': { label: 'INVALID — NEWS DAY', color: '#FF1744', bg: 'bg-invalid/10', border: 'border-invalid/20', glow: 'verdict-glow-red', icon: 'x-circle' },
    'INVALID_NO_SETUP': { label: 'INVALID — NO SETUP', color: '#FF1744', bg: 'bg-invalid/10', border: 'border-invalid/20', glow: 'verdict-glow-red', icon: 'x-circle' },
  };
  return map[verdict] || { label: verdict, color: '#9E9E9E', bg: 'bg-white/5', border: 'border-white/10', glow: '', icon: 'help-circle' };
}

function LevelCheck({ label, status }) {
  const found = status === 'FOUND';
  return (
    <div className="flex items-center gap-2 py-1">
      <LucideIcon name={found ? 'check' : 'x'} size={13} color={found ? '#00E676' : '#FF1744'}/>
      <span className="text-xs text-textSecondary">{label}</span>
      <span className={'ml-auto text-[10px] font-semibold uppercase ' + (found ? 'text-valid' : 'text-invalid')}>{status}</span>
    </div>
  );
}

function PriceLevel({ label, value }) {
  const colors = { 'ABOVE': '#FF1744', 'BELOW': '#00E676', 'UNCLEAR': '#FFA726' };
  const icons = { 'ABOVE': 'arrow-up', 'BELOW': 'arrow-down', 'UNCLEAR': 'minus' };
  return (
    <div className="flex items-center gap-2 py-1">
      <LucideIcon name={icons[value] || 'minus'} size={13} color={colors[value] || '#616161'}/>
      <span className="text-xs text-textSecondary">{label}</span>
      <span className="ml-auto text-[10px] font-bold uppercase" style={{color: colors[value] || '#616161'}}>{value}</span>
    </div>
  );
}

/* ---- Structured Verdict Panel ---- */
function VerdictPanel({ analysis }) {
  const vc = getVerdictConfig(analysis.verdict);

  return (
    <div className="fade-in space-y-3">
      {/* Main Verdict Banner */}
      <div className={`rounded-xl px-5 py-4 ${vc.bg} border ${vc.border} ${vc.glow}`}>
        <div className="flex items-center gap-3 mb-2">
          <LucideIcon name={vc.icon} size={24} color={vc.color}/>
          <span className="font-grotesk font-bold text-lg" style={{color: vc.color}}>{vc.label}</span>
        </div>
        <p className="text-textSecondary text-sm leading-relaxed">{analysis.verdictSummary}</p>
      </div>

      {/* Direction + Bias + Target Row */}
      <div className="grid grid-cols-3 gap-2">
        <div className="surface rounded-lg p-3 text-center">
          <span className="text-textMuted text-[10px] uppercase tracking-wider block mb-1">Bias</span>
          <span className={'font-grotesk font-bold text-base ' + (analysis.activeBias === 'LONG' ? 'text-valid' : analysis.activeBias === 'SHORT' ? 'text-invalid' : 'text-textMuted')}>
            {analysis.activeBias}
          </span>
        </div>
        <div className="surface rounded-lg p-3 text-center">
          <span className="text-textMuted text-[10px] uppercase tracking-wider block mb-1">Direction</span>
          <span className={'font-grotesk font-bold text-base ' + (analysis.activeDirection === 'LONG' ? 'text-valid' : analysis.activeDirection === 'SHORT' ? 'text-invalid' : 'text-textMuted')}>
            {analysis.activeDirection}
          </span>
        </div>
        <div className="surface rounded-lg p-3 text-center">
          <span className="text-textMuted text-[10px] uppercase tracking-wider block mb-1">Target</span>
          <span className="font-grotesk font-semibold text-xs text-cyan">
            {(analysis.activeTarget || '').replace(/_/g, ' ')}
          </span>
        </div>
      </div>

      {/* Time + Tier Row */}
      <div className="grid grid-cols-2 gap-2">
        <div className="surface rounded-lg p-3">
          <div className="flex items-center gap-2 mb-1.5">
            <LucideIcon name="clock" size={13} color="#00E5FF"/>
            <span className="text-textMuted text-[10px] uppercase tracking-wider">Time Read</span>
          </div>
          <span className="font-grotesk font-semibold text-sm text-textPrimary">{analysis.timeRead}</span>
          <span className={'ml-2 text-[10px] font-bold px-1.5 py-0.5 rounded ' +
            (analysis.timeStatus === 'MACRO_ACTIVE' ? 'bg-valid/10 text-valid' :
             analysis.timeStatus === 'PRE_MACRO' ? 'bg-cyan/10 text-cyan' :
             'bg-invalid/10 text-invalid')}>
            {analysis.timeStatus}
          </span>
        </div>
        <div className="surface rounded-lg p-3">
          <div className="flex items-center gap-2 mb-1.5">
            <LucideIcon name="layers" size={13} color="#00E5FF"/>
            <span className="text-textMuted text-[10px] uppercase tracking-wider">Tier Model</span>
          </div>
          <span className="font-grotesk font-semibold text-sm text-textPrimary">{(analysis.tier || '').replace('_', ' ')}</span>
          <p className="text-textMuted text-[10px] mt-0.5">{analysis.tierReason}</p>
        </div>
      </div>

      {/* Levels Found */}
      <div className="surface rounded-lg p-3">
        <div className="flex items-center gap-2 mb-2">
          <LucideIcon name="map-pin" size={13} color="#00E5FF"/>
          <span className="text-textMuted text-[10px] uppercase tracking-wider">Levels Detected</span>
        </div>
        <div className="grid grid-cols-2 gap-x-4">
          <LevelCheck label="Prev Day Close" status={analysis.levelsFound?.prevDayClose}/>
          <LevelCheck label="Midnight Open" status={analysis.levelsFound?.midnightOpen}/>
          <LevelCheck label="8:30 Open" status={analysis.levelsFound?.open830}/>
          <LevelCheck label="9:30 Open" status={analysis.levelsFound?.open930}/>
        </div>
      </div>

      {/* Price vs Levels */}
      <div className="surface rounded-lg p-3">
        <div className="flex items-center gap-2 mb-2">
          <LucideIcon name="bar-chart-3" size={13} color="#00E5FF"/>
          <span className="text-textMuted text-[10px] uppercase tracking-wider">Price vs Levels</span>
        </div>
        <PriceLevel label="vs Midnight Open" value={analysis.priceVsLevels?.vsMidnightOpen}/>
        <PriceLevel label="vs Prev Day Close" value={analysis.priceVsLevels?.vsPrevDayClose}/>
        <PriceLevel label="vs 8:30 Open" value={analysis.priceVsLevels?.vsOpen830}/>
        <div className="mt-2 pt-2 border-t border-white/5">
          <p className="text-textSecondary text-[11px]"><span className="text-cyan font-medium">Bias Reason:</span> {analysis.biasReason}</p>
          {analysis.otherLevelsNote && <p className="text-textMuted text-[10px] mt-0.5">{analysis.otherLevelsNote}</p>}
        </div>
      </div>

      {/* FVG Status */}
      <div className="surface rounded-lg p-3">
        <div className="flex items-center gap-2 mb-2">
          <LucideIcon name="square" size={13} color="#00E5FF"/>
          <span className="text-textMuted text-[10px] uppercase tracking-wider">Fair Value Gap</span>
        </div>
        <div className="flex items-center gap-4">
          <div className="flex items-center gap-1.5">
            <LucideIcon name={analysis.fvgPresent ? 'check' : 'x'} size={13} color={analysis.fvgPresent ? '#00E676' : '#FF1744'}/>
            <span className="text-xs text-textSecondary">{analysis.fvgPresent ? 'Present' : 'Not Found'}</span>
          </div>
          {analysis.fvgPresent && (
            <div className="flex items-center gap-1.5">
              <LucideIcon name={analysis.fvgEngaged ? 'check' : 'minus'} size={13} color={analysis.fvgEngaged ? '#00E676' : '#FFA726'}/>
              <span className="text-xs text-textSecondary">{analysis.fvgEngaged ? 'Engaged' : 'Not Engaged'}</span>
            </div>
          )}
          {analysis.fvgLabel && analysis.fvgLabel !== 'not found' && (
            <span className="text-[10px] text-cyan bg-cyan/10 px-1.5 py-0.5 rounded">{analysis.fvgLabel}</span>
          )}
        </div>
      </div>

      {/* Midpoint Scenario */}
      {analysis.midpointScenario && analysis.midpointScenario.scenarioLabel !== 'NOT_APPLICABLE' && (
        <div className="surface rounded-lg p-3">
          <div className="flex items-center gap-2 mb-2">
            <LucideIcon name="git-branch" size={13} color="#00E5FF"/>
            <span className="text-textMuted text-[10px] uppercase tracking-wider">Midpoint Scenario</span>
            <span className="text-[10px] font-bold text-cyan bg-cyan/10 px-1.5 py-0.5 rounded ml-auto">
              Scenario {analysis.midpointScenario.scenarioLabel}
            </span>
          </div>
          <p className="text-textSecondary text-xs leading-relaxed">{analysis.midpointScenario.scenarioSummary}</p>
        </div>
      )}

      {/* Invalid Reasons */}
      {analysis.invalidReasons && analysis.invalidReasons.length > 0 && (
        <div className="bg-invalid/5 border border-invalid/20 rounded-lg p-3">
          <div className="flex items-center gap-2 mb-2">
            <LucideIcon name="alert-octagon" size={13} color="#FF1744"/>
            <span className="text-invalid text-[10px] uppercase tracking-wider font-semibold">Issues</span>
          </div>
          {analysis.invalidReasons.map((r, i) => (
            <p key={i} className="text-invalid/80 text-xs">• {r}</p>
          ))}
        </div>
      )}
    </div>
  );
}

/* ---- Chart Upload / Validator ---- */
function Validator({ apiKey }) {
  const [file, setFile] = useState(null);
  const [preview, setPreview] = useState(null);
  const [analyzing, setAnalyzing] = useState(false);
  const [analysis, setAnalysis] = useState(null);
  const [error, setError] = useState(null);
  const [dragOver, setDragOver] = useState(false);
  const inputRef = useRef(null);

  const handleFile = useCallback((f) => {
    if (!f) return;
    if (!['image/png','image/jpeg','image/jpg','image/webp'].includes(f.type)) return;
    setFile(f);
    setAnalysis(null);
    setError(null);
    const reader = new FileReader();
    reader.onload = (e) => setPreview(e.target.result);
    reader.readAsDataURL(f);
  }, []);

  const onDrop = useCallback((e) => {
    e.preventDefault(); setDragOver(false);
    handleFile(e.dataTransfer.files[0]);
  }, [handleFile]);

  const analyze = useCallback(async () => {
    if (!apiKey) {
      setError('No API key set. Click the gear icon in the top bar to add your Anthropic API key.');
      return;
    }
    setAnalyzing(true);
    setAnalysis(null);
    setError(null);

    try {
      const formData = new FormData();
      formData.append('chart', file);

      const resp = await fetch('/api/analyze', {
        method: 'POST',
        headers: { 'X-API-Key': apiKey },
        body: formData,
      });

      const data = await resp.json();
      if (!resp.ok) throw new Error(data.error || 'Analysis failed');
      setAnalysis(data.analysis);
    } catch (err) {
      setError(err.message);
    } finally {
      setAnalyzing(false);
    }
  }, [file, apiKey]);

  const reset = useCallback(() => {
    setFile(null); setPreview(null); setAnalysis(null); setError(null); setAnalyzing(false);
  }, []);

  return (
    <div className="space-y-4">
      <div className="flex items-center justify-between mb-1">
        <h2 className="font-grotesk font-bold text-base text-textPrimary flex items-center gap-2">
          <LucideIcon name="scan-line" size={18} color="#00E5FF"/>
          Chart Validator
          <span className="text-[10px] font-medium bg-cyan/10 text-cyan px-1.5 py-0.5 rounded">AI Vision</span>
        </h2>
        {file && <button onClick={reset} className="text-textMuted hover:text-textSecondary text-xs flex items-center gap-1 transition"><LucideIcon name="x" size={14}/> Clear</button>}
      </div>

      {/* Upload Zone */}
      <div
        className={'drop-zone rounded-lg relative overflow-hidden transition-all cursor-pointer ' + (dragOver ? 'drag-over ' : '') + (preview ? 'p-0' : 'p-8')}
        style={{minHeight: preview ? 'auto' : '200px', display:'flex', alignItems:'center', justifyContent:'center'}}
        onDragOver={(e) => { e.preventDefault(); setDragOver(true); }}
        onDragLeave={() => setDragOver(false)}
        onDrop={onDrop}
        onClick={() => !file && inputRef.current && inputRef.current.click()}
      >
        <input ref={inputRef} type="file" accept=".png,.jpg,.jpeg,.webp" className="hidden" onChange={(e) => handleFile(e.target.files[0])}/>

        {!preview ? (
          <div className="flex flex-col items-center justify-center text-center gap-3">
            <div className="w-14 h-14 rounded-xl bg-cyan/5 flex items-center justify-center border border-cyan/10">
              <LucideIcon name="upload-cloud" size={28} color="#00E5FF"/>
            </div>
            <div>
              <p className="text-textSecondary text-sm font-medium">Drop your TradingView chart screenshot</p>
              <p className="text-textMuted text-xs mt-1">1-minute NAS100 chart with labeled levels &middot; PNG, JPG, WebP</p>
            </div>
          </div>
        ) : (
          <div className="relative w-full">
            {analyzing && <div className="scan-overlay"/>}
            <img src={preview} alt="Chart" className="w-full rounded-lg" style={{maxHeight:'400px', objectFit:'contain', background:'#0d0d0d'}}/>
            {analyzing && <div className="absolute inset-0 bg-bg/30 rounded-lg flex items-center justify-center">
              <div className="flex flex-col items-center gap-3">
                <div className="w-10 h-10 border-2 border-cyan border-t-transparent rounded-full animate-spin"/>
                <span className="text-cyan text-xs font-medium uppercase tracking-wider">Vision Engine Analyzing...</span>
                <span className="text-textMuted text-[10px]">Reading levels, time, FVG, and bias from chart</span>
              </div>
            </div>}
          </div>
        )}
      </div>

      {/* Error */}
      {error && (
        <div className="bg-invalid/10 border border-invalid/20 rounded-lg px-4 py-3 flex items-start gap-2">
          <LucideIcon name="alert-circle" size={16} color="#FF1744" className="mt-0.5 flex-shrink-0"/>
          <p className="text-invalid text-xs">{error}</p>
        </div>
      )}

      {/* Analyze Button */}
      {preview && !analysis && (
        <button onClick={analyze} disabled={analyzing} className="btn-primary w-full py-3.5 rounded-lg text-sm flex items-center justify-center gap-2">
          <LucideIcon name="cpu" size={16} color="#121212"/>
          {analyzing ? 'Vision Engine Processing...' : 'Analyze Chart — NY Macro Model'}
        </button>
      )}

      {/* Structured Verdict */}
      {analysis && <VerdictPanel analysis={analysis}/>}

      {/* Re-analyze */}
      {analysis && (
        <button onClick={analyze} disabled={analyzing} className="btn-primary w-full py-2.5 rounded-lg text-xs flex items-center justify-center gap-2">
          <LucideIcon name="refresh-cw" size={14} color="#121212"/>
          Re-Analyze Chart
        </button>
      )}
    </div>
  );
}

/* ---- Session Timeline ---- */
function SessionTimeline({ mins }) {
  const events = [
    { time: '00:00', label: 'Midnight Open', m: 0 },
    { time: '08:30', label: 'Pre-Market Open', m: 510 },
    { time: '09:30', label: 'NY Session Open', m: 570 },
    { time: '09:50', label: 'Macro Start', m: 590, highlight: true },
    { time: '10:10', label: 'Macro End', m: 610 },
    { time: '16:14', label: 'Session Close', m: 974 },
  ];

  function dotClass(m, i) {
    if (mins >= m && (i === events.length - 1 || mins < events[i + 1].m)) return 'active';
    if (mins > m) return 'passed';
    return '';
  }

  return (
    <div className="surface rounded-lg p-4">
      <h3 className="font-grotesk font-semibold text-sm text-textPrimary flex items-center gap-2 mb-3">
        <LucideIcon name="git-branch" size={15} color="#00E5FF"/>
        Session Timeline
      </h3>
      <div className="relative pl-0">
        <div className="timeline-line"/>
        <div className="space-y-3">
          {events.map((ev, i) => {
            const dc = dotClass(ev.m, i);
            const isActive = dc === 'active';
            return (
              <div key={i} className="flex items-center gap-3 relative">
                <div className={'timeline-dot ' + dc + (isActive ? ' pulse-cyan' : '')}>
                  {dc === 'passed' && <span className="w-2 h-2 rounded-full bg-valid"/>}
                  {isActive && <span className="w-2 h-2 rounded-full bg-cyan"/>}
                </div>
                <div className="flex-1 flex items-center justify-between">
                  <span className={'text-xs ' + (isActive ? 'text-cyan font-semibold' : dc === 'passed' ? 'text-textSecondary' : 'text-textMuted') + (ev.highlight ? ' font-semibold' : '')}>{ev.label}</span>
                  <span className={'text-[11px] font-grotesk tabular-nums ' + (isActive ? 'text-cyan' : 'text-textMuted')}>{ev.time}</span>
                </div>
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
}

/* ---- Tier Model Reference ---- */
function TierModel() {
  const tiers = [
    { tier: 1, name: 'Judas Swing', desc: 'False move after open → Liquidity sweep → Reversal. Uses the first FVG.', icon: 'zap' },
    { tier: 2, name: 'Continuation', desc: 'Market does NOT return to the first FVG by 09:45. Strong continuation expected.', icon: 'trending-up' },
    { tier: 3, name: 'Consolidation', desc: 'No major sweep. Accumulation from open until macro window.', icon: 'pause' },
  ];
  return (
    <div className="surface rounded-lg p-4">
      <h3 className="font-grotesk font-semibold text-sm text-textPrimary flex items-center gap-2 mb-3">
        <LucideIcon name="layers" size={15} color="#00E5FF"/>
        Tier Model Reference
      </h3>
      <div className="space-y-2">
        {tiers.map((t) => (
          <div key={t.tier} className="flex items-start gap-3 p-2 rounded hover:bg-white/[0.02] transition">
            <div className="w-7 h-7 rounded bg-cyan/10 flex items-center justify-center flex-shrink-0">
              <LucideIcon name={t.icon} size={14} color="#00E5FF"/>
            </div>
            <div>
              <div className="flex items-center gap-2">
                <span className="text-[10px] font-bold text-cyan bg-cyan/10 px-1.5 py-0.5 rounded">T{t.tier}</span>
                <span className="text-xs font-medium text-textPrimary">{t.name}</span>
              </div>
              <p className="text-textMuted text-[11px] mt-0.5">{t.desc}</p>
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

/* ---- Directional Framework Reference ---- */
function DirectionalFramework() {
  return (
    <div className="surface rounded-lg p-4">
      <h3 className="font-grotesk font-semibold text-sm text-textPrimary flex items-center gap-2 mb-3">
        <LucideIcon name="compass" size={15} color="#00E5FF"/>
        Directional Framework
      </h3>
      <div className="space-y-2">
        <div className="flex items-start gap-2 p-2 rounded bg-valid/5 border border-valid/10">
          <LucideIcon name="arrow-down" size={14} color="#00E676" className="mt-0.5"/>
          <div>
            <span className="text-xs font-semibold text-valid">Long Bias</span>
            <p className="text-textMuted text-[11px]">Price BELOW Midnight Open / 08:30 Open / Previous Close</p>
          </div>
        </div>
        <div className="flex items-start gap-2 p-2 rounded bg-invalid/5 border border-invalid/10">
          <LucideIcon name="arrow-up" size={14} color="#FF1744" className="mt-0.5"/>
          <div>
            <span className="text-xs font-semibold text-invalid">Short Bias</span>
            <p className="text-textMuted text-[11px]">Price ABOVE Midnight Open / 08:30 Open / Previous Close</p>
          </div>
        </div>
        <p className="text-textMuted text-[10px] pt-1 border-t border-white/5">Midnight Open is always the primary bias anchor. FVG must form after 09:30 for valid trade.</p>
      </div>
    </div>
  );
}

/* ---- Footer ---- */
function Footer() {
  return (
    <footer className="mt-6 space-y-3">
      <div className="surface rounded-lg px-4 py-3 flex flex-wrap items-center gap-2 text-xs">
        <LucideIcon name="calendar" size={14} color="#616161"/>
        <span className="text-textMuted">Upcoming:</span>
        <span className="text-textSecondary">NFP — Apr 4</span>
        <span className="text-textMuted">|</span>
        <span className="text-textSecondary">CPI — Apr 10</span>
        <span className="text-textMuted">|</span>
        <span className="text-textSecondary">FOMC — Apr 30</span>
      </div>
      <p className="text-center text-textMuted text-[11px] pb-4">
        SignalTrading v2.0 — AI-Powered Validation for the NY Macro Model
      </p>
    </footer>
  );
}

/* ---- App ---- */
function App() {
  const [nyTime, setNyTime] = useState(getNYTime());
  const [apiKey, saveApiKey] = useApiKey();
  const [settingsOpen, setSettingsOpen] = useState(false);
  const mins = useMemo(() => minutesSinceMidnight(nyTime), [nyTime]);
  const sessionStatus = useMemo(() => getSessionStatus(mins), [mins]);

  useEffect(() => {
    const id = setInterval(() => setNyTime(getNYTime()), 1000);
    return () => clearInterval(id);
  }, []);

  return (
    <div className="min-h-screen bg-bg">
      <TopBar nyTime={nyTime} mins={mins} onSettings={() => setSettingsOpen(true)}/>
      <StatusBar sessionStatus={sessionStatus}/>
      <SettingsModal open={settingsOpen} onClose={() => setSettingsOpen(false)} apiKey={apiKey} onSave={saveApiKey}/>

      <main className="max-w-[1440px] mx-auto px-4 sm:px-6 pt-[100px] pb-4">
        {/* API Key prompt if not set */}
        {!apiKey && (
          <div className="mb-4 bg-cyan/5 border border-cyan/20 rounded-lg px-4 py-3 flex items-center gap-3 fade-in">
            <LucideIcon name="key" size={18} color="#00E5FF"/>
            <div className="flex-1">
              <p className="text-cyan text-sm font-medium">API Key Required</p>
              <p className="text-textMuted text-xs">Click the gear icon to add your Anthropic API key for live chart analysis.</p>
            </div>
            <button onClick={() => setSettingsOpen(true)} className="btn-primary px-3 py-1.5 rounded-lg text-xs">Set Key</button>
          </div>
        )}

        <div className="flex flex-col lg:flex-row gap-4">
          {/* Left Column — Validator */}
          <div className="w-full lg:w-[60%]">
            <div className="surface rounded-lg p-4 sm:p-5">
              <Validator apiKey={apiKey}/>
            </div>
          </div>

          {/* Right Column — Reference Panels */}
          <div className="w-full lg:w-[40%] space-y-4">
            <SessionTimeline mins={mins}/>
            <DirectionalFramework/>
            <TierModel/>
          </div>
        </div>

        <Footer/>
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
